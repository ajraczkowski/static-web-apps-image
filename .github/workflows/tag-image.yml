name: Tag docker image for release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Tag of the existing image
        required: true
      tag:
        description: Tag to apply to the image
        required: true
        default: testing

jobs:
  build_and_publish_job:
    runs-on: ubuntu-latest
    name: Tag and Release Job
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag image
        uses: shrink/actions-docker-registry-tag@v4
        with:
          registry: ghcr.io
          repository: ${{ github.actor }}/staticwebapps
          target: ${{ github.event.inputs.target }}
          tags: ${{ github.event.inputs.tag }}
